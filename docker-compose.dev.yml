services:
    postgres:
        image: pgvector/pgvector:pg17
        container_name: llm-db
        restart: unless-stopped
        environment:
            POSTGRES_HOST_AUTH_METHOD: scram-sha-256
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - ecommerce_network

    redis:
        image: redis:latest
        container_name: redis-server
        restart: always
        ports:
            - "6379:6379"
        command: redis-server --requirepass ${REDIS_PASSWORD}
        volumes:
            - cache:/data
        healthcheck:
            test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - ecommerce_network

    api:
        build:
            context: .
            dockerfile: Dockerfile
        container_name: ecommerce_api
        restart: unless-stopped
        env_file:
            - .env
        ports:
            - "8000:8000"
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        networks:
            - ecommerce_network
        volumes: # hot reload on dev (remove on prod)
            - ./app:/app/app
            - ./alembic:/app/alembic

    llm-nginx:
        image: nginx:latest
        container_name: llm-nginx
        restart: unless-stopped
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./nginx.conf:/etc/nginx/nginx.conf:ro
            - ./certs:/etc/nginx/certs:ro
        extra_hosts:
            - "host.docker.internal:host-gateway"
        depends_on:
            - api
        networks:
            - ecommerce_network

networks:
    ecommerce_network:
        driver: bridge

volumes:
    postgres_data:
    cache:
        driver: local
